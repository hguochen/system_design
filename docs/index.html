<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Study Hub</title>
<style>
  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface-alt: #f3f2ef;
    --border: #e5e3de;
    --text: #1a1917;
    --text-muted: #6b6861;
    --text-faint: #a09d97;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent-hover: #1d4ed8;
    --green: #16a34a;
    --green-light: #dcfce7;
    --sidebar-w: 268px;
    font-size: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; font-family: inherit; }

  /* ─────────────────────────────────────────
     TOP BAR (reader view only)
  ───────────────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 200;
  }

  #topbar-hamburger {
    display: none;
    background: none;
    border: none;
    padding: 6px;
    border-radius: 6px;
    color: var(--text-muted);
    line-height: 1;
  }
  #topbar-hamburger:hover { background: var(--surface-alt); }
  #topbar-hamburger svg { display: block; }

  #topbar-back {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 6px;
    border: none;
    background: none;
  }
  #topbar-back:hover { background: var(--accent-light); }

  #topbar-breadcrumb {
    font-size: 14px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #topbar-breadcrumb strong { color: var(--text); }

  /* ─────────────────────────────────────────
     READER LAYOUT
  ───────────────────────────────────────── */
  #reader-view {
    display: none;
    padding-top: 52px; /* topbar height */
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    top: 52px; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 100;
    padding-bottom: 32px;
  }

  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 99;
  }

  .nav-phase {
    padding: 16px 16px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    user-select: none;
  }
  .nav-phase:not(:first-child) { margin-top: 8px; }

  .nav-topic {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .nav-topic:hover { color: var(--text); }
  .nav-topic .toggle {
    margin-left: auto;
    font-size: 10px;
    transition: transform 0.15s;
    color: var(--text-faint);
  }
  .nav-topic.open .toggle { transform: rotate(90deg); }

  .nav-subtopics { overflow: hidden; }
  .nav-subtopics.collapsed { display: none; }

  .nav-subtopic {
    display: block;
    padding: 5px 16px 5px 36px;
    font-size: 13px;
    color: var(--text-muted);
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: background 0.1s;
    line-height: 1.4;
  }
  .nav-subtopic:hover { background: var(--surface-alt); color: var(--text); }
  .nav-subtopic.active {
    background: var(--accent-light);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .nav-subtopic.no-file {
    color: var(--text-faint);
    cursor: default;
    pointer-events: none;
  }
  .nav-subtopic .badge-done {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ── CONTENT ── */
  #content {
    margin-left: var(--sidebar-w);
    min-height: calc(100vh - 52px);
  }

  #topic-frame {
    display: block;
    width: 100%;
    border: none;
    overflow: hidden;
  }

  /* ─────────────────────────────────────────
     HOME VIEW
  ───────────────────────────────────────── */
  #home-view {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .home-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .home-header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .home-header p {
    color: var(--text-muted);
    font-size: 15px;
  }
  .home-header .progress-summary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 8px 16px;
    background: var(--green-light);
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    color: var(--green);
  }

  .phase-section { margin-bottom: 40px; }

  .phase-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .topic-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .topic-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: #ccc; }

  .topic-card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .topic-card-emoji { font-size: 20px; line-height: 1; margin-top: 2px; flex-shrink: 0; }
  .topic-card-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
  .topic-card-num { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .subtopic-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .subtopic-pill {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 99px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .subtopic-pill.has-file {
    background: var(--accent-light);
    color: var(--accent);
    border-color: #bfdbfe;
  }
  .subtopic-pill.has-file:hover { background: #bfdbfe; }
  .subtopic-pill.no-file {
    background: var(--surface-alt);
    color: var(--text-faint);
    cursor: default;
  }
  .subtopic-pill.done {
    background: var(--green-light);
    color: var(--green);
    border-color: #86efac;
  }
  .subtopic-pill.done:hover { background: #bbf7d0; }

  /* ─────────────────────────────────────────
     RESPONSIVE — MOBILE
  ───────────────────────────────────────── */
  @media (max-width: 767px) {
    #topbar-hamburger { display: flex; align-items: center; justify-content: center; }

    #sidebar {
      transform: translateX(-100%);
      transition: transform 0.22s ease;
      top: 52px;
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }

    #content { margin-left: 0; }

    #home-view { padding: 28px 16px 60px; }
    .home-header h1 { font-size: 1.5rem; }
    .topic-cards { grid-template-columns: 1fr; }
  }
</style>
</head>

</div>

<script>
(function () {
  // ── DOM refs ──────────────────────────────
  const homeView     = document.getElementById('home-view');
  const readerView   = document.getElementById('reader-view');
  const topbar       = document.getElementById('topbar');
  const hamburger    = document.getElementById('topbar-hamburger');
  const backBtn      = document.getElementById('topbar-back');
  const breadcrumb   = document.getElementById('topbar-breadcrumb');
  const sidebarEl    = document.getElementById('sidebar');
  const overlay      = document.getElementById('sidebar-overlay');
  const contentEl    = document.getElementById('content');
  const frame        = document.getElementById('topic-frame');
  const phaseList    = document.getElementById('phase-list');
  const progressEl   = document.getElementById('progress-summary');

  let activeSubtopicId = null;
  let openTopicNums = new Set();

  // ── PROGRESS SUMMARY ─────────────────────
  function calcProgress() {
    let total = 0, done = 0, hasFile = 0;
    PHASES.forEach(ph => ph.topics.forEach(t => t.subtopics.forEach(s => {
      total++;
      if (s.done) done++;
      if (s.file) hasFile++;
    })));
    return { total, done, hasFile };
  }

  // ── BUILD HOME VIEW ───────────────────────
  function buildHome() {
    const { total, done, hasFile } = calcProgress();
    progressEl.innerHTML = `✅ ${done} / ${total} subtopics completed &nbsp;·&nbsp; 📄 ${hasFile} notes available`;

    phaseList.innerHTML = '';

    PHASES.forEach(phase => {
      const section = document.createElement('div');
      section.className = 'phase-section';

      const heading = document.createElement('div');
      heading.className = 'phase-heading';
      heading.textContent = phase.label;
      section.appendChild(heading);

      const cards = document.createElement('div');
      cards.className = 'topic-cards';

      phase.topics.forEach(topic => {
        const card = document.createElement('div');
        card.className = 'topic-card';

        const header = document.createElement('div');
        header.className = 'topic-card-header';
        header.innerHTML = `
          <div class="topic-card-emoji">${topic.emoji}</div>
          <div>
            <div class="topic-card-title">${topic.label}</div>
            <div class="topic-card-num">Topic ${topic.num}</div>
          </div>`;
        card.appendChild(header);

        const pills = document.createElement('div');
        pills.className = 'subtopic-pills';
        topic.subtopics.forEach(sub => {
          const pill = document.createElement('span');
          pill.className = 'subtopic-pill';
          pill.textContent = sub.id;
          pill.title = sub.label;

          if (sub.done && sub.file) {
            pill.classList.add('done');
            pill.addEventListener('click', () => openSubtopic(sub, topic, phase));
          } else if (sub.done) {
            pill.classList.add('done');
            pill.style.cursor = 'default';
          } else if (sub.file) {
            pill.classList.add('has-file');
            pill.addEventListener('click', () => openSubtopic(sub, topic, phase));
          } else {
            pill.classList.add('no-file');
          }

          pills.appendChild(pill);
        });
        card.appendChild(pills);
        cards.appendChild(card);
      });

      section.appendChild(cards);
      phaseList.appendChild(section);
    });
  }

  // ── BUILD SIDEBAR NAV ─────────────────────
  function buildSidebar(activeId) {
    sidebarEl.innerHTML = '';

    PHASES.forEach(phase => {
      const phaseHeader = document.createElement('div');
      phaseHeader.className = 'nav-phase';
      phaseHeader.textContent = phase.label;
      sidebarEl.appendChild(phaseHeader);

      phase.topics.forEach(topic => {
        // Topic header (collapsible)
        const topicEl = document.createElement('div');
        topicEl.className = 'nav-topic';
        const isOpen = openTopicNums.has(topic.num);
        if (isOpen) topicEl.classList.add('open');

        topicEl.innerHTML = `
          <span>${topic.emoji}</span>
          <span>${topic.num}. ${topic.label}</span>
          <span class="toggle">▶</span>`;

        const subtopicsEl = document.createElement('div');
        subtopicsEl.className = 'nav-subtopics' + (isOpen ? '' : ' collapsed');

        topicEl.addEventListener('click', () => {
          const nowOpen = !topicEl.classList.contains('open');
          topicEl.classList.toggle('open', nowOpen);
          subtopicsEl.classList.toggle('collapsed', !nowOpen);
          if (nowOpen) openTopicNums.add(topic.num);
          else openTopicNums.delete(topic.num);
        });

        sidebarEl.appendChild(topicEl);

        topic.subtopics.forEach(sub => {
          const subEl = document.createElement('div');
          subEl.className = 'nav-subtopic' + (sub.file ? '' : ' no-file');
          if (sub.id === activeId) subEl.classList.add('active');

          subEl.innerHTML = `${sub.id} ${sub.label}${sub.done ? '<span class="badge-done"></span>' : ''}`;
          subEl.title = sub.label;

          if (sub.file) {
            subEl.addEventListener('click', () => {
              closeSidebarMobile();
              openSubtopic(sub, topic, phase);
            });
          }

          subtopicsEl.appendChild(subEl);
        });

        sidebarEl.appendChild(subtopicsEl);
      });
    });
  }

  // ── OPEN A SUBTOPIC ───────────────────────
  function openSubtopic(sub, topic, phase) {
    activeSubtopicId = sub.id;
    openTopicNums.add(topic.num);

    // Show reader view
    homeView.style.display = 'none';
    readerView.style.display = 'block';

    // Breadcrumb
    breadcrumb.innerHTML = `${phase.label} &rsaquo; T${topic.num} &rsaquo; <strong>${sub.id} ${sub.label}</strong>`;

    // Rebuild sidebar with current active
    buildSidebar(sub.id);

    // Scroll active nav item into view
    requestAnimationFrame(() => {
      const activeEl = sidebarEl.querySelector('.nav-subtopic.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    });

    // Load iframe
    frame.style.height = '600px'; // placeholder while loading
    frame.src = sub.file;

    frame.onload = () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const h = doc.documentElement.scrollHeight;
        frame.style.height = h + 'px';
      } catch (e) {
        frame.style.height = '100vh';
      }
    };

    // Scroll outer page to top
    window.scrollTo(0, 0);
  }

  // ── SHOW HOME ─────────────────────────────
  function showHome() {
    readerView.style.display = 'none';
    homeView.style.display = 'block';
    activeSubtopicId = null;
    window.scrollTo(0, 0);
  }

  // ── MOBILE SIDEBAR ───────────────────────
  hamburger.addEventListener('click', () => {
    sidebarEl.classList.toggle('open');
    overlay.classList.toggle('open');
  });
  overlay.addEventListener('click', closeSidebarMobile);

  function closeSidebarMobile() {
    sidebarEl.classList.remove('open');
    overlay.classList.remove('open');
  }

  // ── BACK BUTTON ───────────────────────────
  backBtn.addEventListener('click', showHome);

  // ── URL HASH ROUTING ─────────────────────
  // Support deep-linking: index.html#3.2
  function routeFromHash() {
    const hash = location.hash.replace('#', '').trim();
    if (!hash) return;
    for (const phase of PHASES) {
      for (const topic of phase.topics) {
        for (const sub of topic.subtopics) {
          if (sub.id === hash && sub.file) {
            openSubtopic(sub, topic, phase);
            return;
          }
        }
      }
    }
  }

  window.addEventListener('hashchange', routeFromHash);

  // ── INIT ─────────────────────────────────
  buildHome();

  // Auto-expand topics that have available files in sidebar on first open
  PHASES.forEach(phase => phase.topics.forEach(topic => {
    if (topic.subtopics.some(s => s.file)) openTopicNums.add(topic.num);
  }));

  routeFromHash();
})();
</script>
</body>
</html>
